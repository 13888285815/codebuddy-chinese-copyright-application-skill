<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件著作权申请材料生成工具</title>
    <style>
        /* 全局重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面主体样式 */
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 容器样式 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 表单容器样式 */
        .form-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        /* 表单步骤样式 */
        .form-step {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .form-step:last-child {
            border-bottom: none;
        }

        /* 步骤标题样式 */
        .step-title {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            color: #333;
        }

        .step-number {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.1rem;
        }

        .step-title h2 {
            font-size: 1.4rem;
            color: #2c3e50;
        }

        /* 表单网格布局 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* 表单组样式 */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group .hint {
            font-size: 0.8rem;
            color: #95a5a6;
            margin-top: 6px;
        }

        /* 文件上传区域样式 */
        .file-upload {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .file-upload i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }

        .file-upload span {
            color: #34495e;
            font-weight: 500;
        }

        .file-upload small {
            color: #95a5a6;
            display: block;
            margin-top: 8px;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        /* 按钮组样式 */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 30px;
            background: #f8f9fa;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #bdbdbd;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 进度条容器样式 */
        .progress-container {
            display: none;
            padding: 30px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #666;
            font-size: 1rem;
        }

        /* 结果容器样式 */
        .result-container {
            display: none;
            padding: 30px;
        }

        .result-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-title h3 {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .result-title p {
            color: #7f8c8d;
        }

        /* 文档列表样式 */
        .document-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .document-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .document-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .document-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 1.5rem;
        }

        .document-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .document-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-download {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            background: #5a6fd6;
        }

        .btn-preview {
            padding: 8px 20px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-preview:hover {
            background: #bdbdbd;
        }

        /* 弹窗遮罩样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h4 {
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: #666;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #e0e0e0;
        }

        .modal-body {
            padding: 30px;
            max-height: calc(80vh - 100px);
            overflow-y: auto;
        }

        /* 预览内容样式 */
        .preview-content {
            white-space: pre-wrap;
            font-family: "Courier New", monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .preview-content h1,
        .preview-content h2,
        .preview-content h3 {
            font-family: "Microsoft YaHei", sans-serif;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .preview-content h1 { font-size: 1.5rem; color: #2c3e50; }
        .preview-content h2 { font-size: 1.3rem; color: #34495e; }
        .preview-content h3 { font-size: 1.1rem; color: #7f8c8d; }

        .preview-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .preview-content th,
        .preview-content td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .preview-content th {
            background: #667eea;
            color: white;
        }

        .preview-content ul,
        .preview-content ol {
            padding-left: 20px;
            margin: 10px 0;
        }

        /* 错误消息样式 */
        .error-message {
            background: #ffebee;
            border-left: 4px solid #e53935;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            color: #c62828;
            display: none;
        }

        /* 成功消息样式 */
        .success-message {
            background: #e8f5e9;
            border-left: 4px solid #43a047;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            color: #2e7d32;
        }

        /* 移动端响应式样式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .form-step {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .document-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="header">
            <h1>📝 软件著作权申请材料生成工具</h1>
            <p>快速生成符合中国版权保护中心要求的申请材料</p>
        </div>

        <!-- 表单容器 -->
        <div class="form-container">
            <!-- 步骤一：项目信息 -->
            <div class="form-step">
                <div class="step-title">
                    <div class="step-number">1</div>
                    <h2>项目信息</h2>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="projectPath">项目路径</label>
                        <input type="text" id="projectPath" placeholder="/path/to/your/project">
                        <span class="hint">请输入本地项目路径或上传项目文件</span>
                    </div>
                    <div class="form-group">
                        <label for="outputPath">输出目录</label>
                        <input type="text" id="outputPath" placeholder="默认: copyright-application-materials">
                        <span class="hint">生成文档的保存位置</span>
                    </div>
                </div>
                <div class="file-upload" id="fileUpload">
                    <i>📁</i>
                    <span>点击或拖拽上传项目文件</span>
                    <small>支持 ZIP、RAR 等压缩包格式</small>
                    <input type="file" id="fileInput" multiple webkitdirectory directory>
                </div>
            </div>

            <!-- 步骤二：著作权人信息 -->
            <div class="form-step">
                <div class="step-title">
                    <div class="step-number">2</div>
                    <h2>著作权人信息</h2>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ownerName">著作权人名称 *</label>
                        <input type="text" id="ownerName" placeholder="个人姓名或公司全称" required>
                    </div>
                    <div class="form-group">
                        <label for="idType">证件类型 *</label>
                        <select id="idType">
                            <option value="身份证">身份证</option>
                            <option value="营业执照">营业执照</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="idNumber">证件号码</label>
                        <input type="text" id="idNumber" placeholder="请输入证件号码">
                    </div>
                    <div class="form-group">
                        <label for="address">联系地址</label>
                        <input type="text" id="address" placeholder="详细联系地址">
                    </div>
                    <div class="form-group">
                        <label for="zipCode">邮政编码</label>
                        <input type="text" id="zipCode" placeholder="邮政编码">
                    </div>
                    <div class="form-group">
                        <label for="contact">联系人</label>
                        <input type="text" id="contact" placeholder="联系人姓名">
                    </div>
                    <div class="form-group">
                        <label for="phone">联系电话</label>
                        <input type="tel" id="phone" placeholder="联系电话">
                    </div>
                    <div class="form-group">
                        <label for="email">电子邮箱</label>
                        <input type="email" id="email" placeholder="电子邮箱">
                    </div>
                </div>
            </div>

            <!-- 步骤三：软件信息 -->
            <div class="form-step">
                <div class="step-title">
                    <div class="step-number">3</div>
                    <h2>软件信息</h2>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="softwareType">软件类型 *</label>
                        <select id="softwareType">
                            <option value="小程序">小程序</option>
                            <option value="APP">APP</option>
                            <option value="Web应用">Web应用</option>
                            <option value="游戏软件">游戏软件</option>
                            <option value="教育软件">教育软件</option>
                            <option value="金融软件">金融软件</option>
                            <option value="人工智能软件">人工智能软件</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="devPurpose">开发目的</label>
                        <input type="text" id="devPurpose" placeholder="限50字，简要说明开发目的">
                        <span class="hint">限50字</span>
                    </div>
                    <div class="form-group">
                        <label for="industry">面向领域/行业</label>
                        <input type="text" id="industry" placeholder="限50字，说明主要应用领域">
                        <span class="hint">限50字</span>
                    </div>
                    <div class="form-group">
                        <label for="mainFunctions">软件的主要功能</label>
                        <textarea id="mainFunctions" placeholder="限200字，清晰描述核心功能"></textarea>
                        <span class="hint">限200字</span>
                    </div>
                    <div class="form-group">
                        <label for="techFeatures">技术特点</label>
                        <textarea id="techFeatures" placeholder="限100字，描述技术创新和优势"></textarea>
                        <span class="hint">限100字</span>
                    </div>
                </div>
            </div>

            <!-- 按钮组 -->
            <div class="button-group">
                <button class="btn btn-secondary" onclick="resetForm()">重置</button>
                <button class="btn btn-primary" onclick="generateDocs()" id="generateBtn">生成文档</button>
            </div>

            <!-- 进度条容器 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">正在生成文档...</div>
            </div>

            <!-- 结果容器 -->
            <div class="result-container" id="resultContainer">
                <div class="result-title">
                    <h3>✅ 文档生成成功！</h3>
                    <p>以下是生成的申请材料，点击下载或预览</p>
                </div>
                <div class="document-list" id="documentList">
                    <!-- 申请表 -->
                    <div class="document-card">
                        <div class="document-icon">📄</div>
                        <div class="document-name">软件著作权登记申请表</div>
                        <div class="document-actions">
                            <button class="btn-preview" onclick="previewDoc('application')">预览</button>
                            <button class="btn-download" onclick="downloadDoc('application')">下载</button>
                        </div>
                    </div>
                    <!-- 源代码文档 -->
                    <div class="document-card">
                        <div class="document-icon">📝</div>
                        <div class="document-name">源代码文档</div>
                        <div class="document-actions">
                            <button class="btn-preview" onclick="previewDoc('source')">预览</button>
                            <button class="btn-download" onclick="downloadDoc('source')">下载</button>
                        </div>
                    </div>
                    <!-- 用户手册 -->
                    <div class="document-card">
                        <div class="document-icon">📘</div>
                        <div class="document-name">用户手册</div>
                        <div class="document-actions">
                            <button class="btn-preview" onclick="previewDoc('manual')">预览</button>
                            <button class="btn-download" onclick="downloadDoc('manual')">下载</button>
                        </div>
                    </div>
                    <!-- 设计说明书 -->
                    <div class="document-card">
                        <div class="document-icon">📗</div>
                        <div class="document-name">设计说明书</div>
                        <div class="document-actions">
                            <button class="btn-preview" onclick="previewDoc('design')">预览</button>
                            <button class="btn-download" onclick="downloadDoc('design')">下载</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 弹窗遮罩 -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 id="modalTitle">文档预览</h4>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="preview-content" id="previewContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存储生成的文档内容
        let generatedDocs = {};

        /**
         * 生成文档函数
         * 1. 验证表单数据
         * 2. 显示进度条
         * 3. 生成模拟文档
         * 4. 显示结果
         */
        function generateDocs() {
            // 获取著作权人名称并验证
            const ownerName = document.getElementById('ownerName').value.trim();
            if (!ownerName) {
                alert('请填写著作权人名称');
                return;
            }

            // 禁用生成按钮，隐藏表单，显示进度条
            document.getElementById('generateBtn').disabled = true;
            document.querySelector('.form-container').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'block';

            // 获取进度条元素
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            // 模拟进度条动画
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressText.textContent = `正在生成文档... ${Math.round(progress)}%`;
            }, 300);

            // 模拟文档生成过程
            setTimeout(() => {
                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressText.textContent = '文档生成完成！';

                // 生成模拟文档内容
                generateMockDocs();

                // 延迟显示结果
                setTimeout(() => {
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('resultContainer').style.display = 'block';
                }, 500);
            }, 2000);
        }

        /**
         * 生成模拟文档内容
         * 根据用户输入的信息生成四份申请材料
         */
        function generateMockDocs() {
            // 获取用户输入的表单数据
            const ownerName = document.getElementById('ownerName').value.trim();
            const idType = document.getElementById('idType').value;
            const softwareType = document.getElementById('softwareType').value;
            const devPurpose = document.getElementById('devPurpose').value || '未填写';
            const industry = document.getElementById('industry').value || '未填写';
            const mainFunctions = document.getElementById('mainFunctions').value || '未填写';
            const techFeatures = document.getElementById('techFeatures').value || '未填写';

            // 获取当前日期
            const currentDate = new Date().toISOString().split('T')[0];

            // 生成软件著作权登记申请表
            generatedDocs['application'] = `# 软件著作权登记申请表

**著作权人：${ownerName}**

## 基本信息

| 字段 | 内容 |
|------|------|
| 软件全称 | 示例软件 |
| 软件简称 | 示例软件 |
| 版本号 | V1.0 |
| 开发完成日期 | ${currentDate} |
| 首次发表日期 | ${currentDate} |

## 著作权人信息

| 字段 | 内容 |
|------|------|
| 著作权人 | ${ownerName} |
| 证件类型 | ${idType} |
| 证件号码 | （请填写） |
| 地址 | （请填写） |
| 邮编 | （请填写） |

        /**
         * Markdown转HTML函数
         * @param {string} markdown - Markdown文本
         * @returns {string} HTML文本
         */
        function markdownToHtml(markdown) {
            return markdown
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')      // 三级标题
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')        // 二级标题
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')         // 一级标题
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>') // 加粗
                .replace(/\*(.*)\*/gim, '<em>$1</em>')           // 斜体
                .replace(/^- (.*$)/gim, '<li>$1</li>')           // 无序列表
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')       // 有序列表
                .replace(/```(\w+)?\n([\s\S]*?)```/gim, '<pre><code>$2</code></pre>') // 代码块
                .replace(/`([^`]+)`/gim, '<code>$1</code>')       // 行内代码
                .replace(/^\|(.+)\|\n\|[-|]+\|\n((?:\|.+\|\n?)+)/gim, (match, header, body) => {
                    // 表格转换
                    const headerCells = header.split('|').filter(cell => cell.trim());
                    const bodyRows = body.trim().split('\n');
                    let html = '<table><thead><tr>';
                    headerCells.forEach(cell => {
                        html += `<th>${cell.trim()}</th>`;
                    });
                    html += '</tr></thead><tbody>';
                    bodyRows.forEach(row => {
                        const cells = row.split('|').filter(cell => cell.trim());
                        html += '<tr>';
                        cells.forEach(cell => {
                            html += `<td>${cell.trim()}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    return html;
                })
                .replace(/---\n/gim, '<hr>')                   // 分割线
                .replace(/\n/gim, '<br>');                    // 换行
        }
